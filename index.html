<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Pro - Barra & Cocina</title>
    <style>
        :root { --bg-primary: #f8fafc; --panel-bg: #ffffff; --text-main: #1e293b; --text-muted: #64748b; --accent: #2563eb; --border: #e2e8f0; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --color-barra: #0284c7; --color-cocina: #db2777; --current-unit-color: var(--color-barra); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-primary); padding: 2rem; }
        .grid { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        .panel { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; }
        button { width: 100%; padding: 10px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-primary { background: var(--current-unit-color); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; }
        .stock-critico { background: #fef2f2; color: #b91c1c; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, query, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = { apiKey: "AIzaSyBo2atzdPgNnT6OUpPdzRZ1yFs44uhVAqE", projectId: "inventarios-restaurantes", appId: "1:1005713681720:web:76b2cf534c34aa0a17e5cd" };
        const db = getFirestore(initializeApp(firebaseConfig));
        
        window.db = db; window.setDoc = setDoc; window.doc = doc; window.onSnapshot = onSnapshot; 
        window.collection = collection; window.query = query; window.orderBy = orderBy; window.deleteDoc = deleteDoc;
    </script>
</head>
<body>

    <div class="grid">
        <div class="panel">
            <h3>Gestión de Inventario</h3>
            <form id="prodForm">
                <input type="text" id="pName" placeholder="Nombre Producto" required>
                <input type="number" id="pInit" placeholder="Inicial" required>
                <input type="number" id="pIn" placeholder="Entradas" required>
                <input type="number" id="pFin" placeholder="Final" required>
                <input type="number" id="pMin" placeholder="Mínimo" required>
                <button type="submit" class="btn-primary">Guardar Producto</button>
            </form>
            
            <hr style="margin: 20px 0;">
            
            <button onclick="downloadTemplateCSV()" style="background:#10b981; color:white;">⏬ Descargar Plantilla CSV</button>
            <input type="file" id="csvFile" style="margin-top:10px;">
            <button onclick="importCSV()" style="background:#475569; color:white;">⬆️ Cargar CSV</button>
            <button onclick="shiftInventory()" class="btn-warning">🔄 Cerrar Ciclo</button>
        </div>

        <div class="panel">
            <table>
                <thead><tr><th>Producto</th><th>Inicial</th><th>Entradas</th><th>Final</th><th>Mínimo</th><th>Consumido</th><th>Acciones</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let currentArea = 'barra'; // Cambiar a 'cocina' según sea necesario
        
        // --- LÓGICA DE SINCRONIZACIÓN CSV ---
        function downloadTemplateCSV() {
            let csv = "Producto,Inicial,Entradas,Final,Minimo\n";
            document.querySelectorAll('#tableBody tr').forEach(tr => {
                const cols = tr.querySelectorAll('td');
                csv += `${cols[0].innerText},${cols[1].innerText},${cols[2].innerText},${cols[3].innerText},${cols[4].innerText}\n`;
            });
            const blob = new Blob([csv], {type: 'text/csv'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = "inventario.csv"; a.click();
        }

        async function importCSV() {
            const file = document.getElementById('csvFile').files[0];
            const reader = new FileReader();
            reader.onload = async (e) => {
                const lines = e.target.result.split('\n').slice(1);
                for(let line of lines) {
                    const [name, init, in_, fin, min] = line.split(',');
                    if(!name) continue;
                    await setDoc(doc(window.db, currentArea, name), {
                        name, inicial: +init, entradas: +in_, final: +fin, minimo: +min
                    });
                }
                alert("Sincronización completa");
            };
            reader.readAsText(file);
        }

        async function shiftInventory() {
            if(!confirm("¿Cerrar ciclo?")) return;
            // Lógica de cierre (Final -> Inicial)
            // ... (Añadir iteración sobre documentos actuales)
            alert("Ciclo cerrado");
        }

        // Renderizado básico
        window.onSnapshot(window.query(window.collection(window.db, 'barra'), window.orderBy('name')), (snap) => {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            snap.forEach(doc => {
                const p = doc.data();
                const cons = (p.inicial + p.entradas) - p.final;
                tbody.innerHTML += `<tr><td>${p.name}</td><td>${p.inicial}</td><td>${p.entradas}</td><td>${p.final}</td><td>${p.minimo}</td><td>${cons}</td><td><button onclick="deleteDoc(doc(window.db, '${currentArea}', '${doc.id}'))">🗑️</button></td></tr>`;
            });
        });
    </script>
</body>
</html>
