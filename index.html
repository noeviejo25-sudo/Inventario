<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario Pro - Operativo</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .panel { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; color: white; background: #2563eb; }
    </style>
</head>
<body>

<div class="panel">
    <h3>Gestión de Inventario</h3>
    <input type="file" id="csvFile">
    <button class="btn" onclick="iniciarCarga()">Cargar CSV</button>
    <p id="status"></p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBo2atzdPgNnT6OUpPdzRZ1yFs44uhVAqE",
        projectId: "inventarios-restaurantes",
        appId: "1:1005713681720:web:76b2cf534c34aa0a17e5cd"
    };

    const db = getFirestore(initializeApp(firebaseConfig));

    window.iniciarCarga = async () => {
        const fileInput = document.getElementById('csvFile');
        const status = document.getElementById('status');
        
        if (!fileInput.files.length) return alert("Selecciona un archivo");
        
        status.innerText = "Estado: Procesando...";
        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = async (e) => {
            const rows = e.target.result.split('\n');
            let exito = 0;
            
            for (let i = 1; i < rows.length; i++) {
                const [nombre, inicial, entradas, final] = rows[i].split(',');
                if (!nombre) continue;
                
                try {
                    await setDoc(doc(db, "barra", nombre.trim()), {
                        nombre: nombre.trim(),
                        inicial: Number(inicial),
                        entradas: Number(entradas),
                        final: Number(final)
                    });
                    exito++;
                } catch (err) {
                    console.error("Error en fila " + i, err);
                }
            }
            status.innerText = "Estado: Finalizado. Productos procesados: " + exito;
            alert("Proceso finalizado con " + exito + " registros.");
        };
        reader.readAsText(file);
    };
</script>
</body>
</html>
