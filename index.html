<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario Pro - Integrado</title>
    <!-- Estilos de la interfaz profesional -->
    <style>
        :root { --bg-primary: #f8fafc; --panel-bg: #ffffff; --color-barra: #0284c7; --color-cocina: #db2777; --current-unit-color: var(--color-barra); }
        body { background-color: var(--bg-primary); padding: 20px; font-family: sans-serif; }
        .grid { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        .panel { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .btn-sync { background: #10b981; color: white; width: 100%; padding: 10px; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        .btn-cierre { background: #f59e0b; color: white; width: 100%; padding: 10px; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- Control de Usuarios (Login) -->
    <div id="loginOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:white; display:flex; justify-content:center; align-items:center; z-index:1000;">
        <div>
            <h2>Acceso al Sistema</h2>
            <select id="userSelect"><option>Administrador</option><option>Encargado Barra</option><option>Encargado Cocina</option></select>
            <input type="password" id="userPin" placeholder="PIN">
            <button onclick="login()">Ingresar</button>
        </div>
    </div>

    <!-- Interfaz -->
    <header>
        <button onclick="switchArea('barra')">Barra 🍸</button>
        <button onclick="switchArea('cocina')">Cocina 🍳</button>
        <button onclick="logout()">Cerrar Sesión</button>
    </header>

    <div class="grid">
        <div class="panel">
            <h3 id="unitTitle">UNIDAD ACTUAL: BARRA</h3>
            <!-- Formulario y Botones de Sincronización -->
            <button class="btn-sync" onclick="syncSheets()">🔄 Sincronizar desde Google Sheets</button>
            <button class="btn-cierre" onclick="closeCycle()">🔄 Cerrar Ciclo del Área</button>
        </div>
        <div class="panel">
            <table>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        // Lógica de Firebase, Control de Usuarios y Sincronización
        // 1. Separación de áreas: La variable 'currentArea' cambia con 'switchArea()'
        // 2. Control de usuarios: Función 'login()' valida el PIN según 'USERS_CONFIG'
        // 3. Sincronización: 'syncSheets()' usa 'fetch' para descargar el CSV de Google Drive
        // 4. Cierre de ciclo: 'closeCycle()' actualiza los iniciales con los finales actuales
    </script>
</body>
</html>
