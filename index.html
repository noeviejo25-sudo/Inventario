<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario Pro - Sistema Dual</title>
    <style>
        :root { --bg: #f8fafc; --panel: #ffffff; --barra: #0284c7; --cocina: #db2777; --text: #1e293b; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; max-width: 1200px; margin: auto; }
        .panel { background: var(--panel); padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .btn-barra { background: var(--barra); color: white; padding: 10px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-cocina { background: var(--cocina); color: white; padding: 10px; border: none; border-radius: 4px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; text-align: left; }
    </style>
</head>
<body>

    <h1>Inventario Pro: Barra & Cocina</h1>
    
    <div class="panel">
        <h3>Sincronización</h3>
        <button class="btn-barra" onclick="sincronizar('barra')">Sincronizar Barra</button>
        <button class="btn-cocina" onclick="sincronizar('cocina')">Sincronizar Cocina</button>
    </div>

    <div class="panel">
        <h3>Inventario en la Nube</h3>
        <table id="invTable">
            <thead><tr><th>Área</th><th>Producto</th><th>Cantidad</th></tr></thead>
            <tbody id="invBody"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBo2atzdPgNnT6OUpPdzRZ1yFs44uhVAqE",
            authDomain: "inventarios-restaurantes.firebaseapp.com",
            projectId: "inventarios-restaurantes",
            storageBucket: "inventarios-restaurantes.firebasestorage.app",
            messagingSenderId: "1005713681720",
            appId: "1:1005713681720:web:76b2cf534c34aa0a17e5cd"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const LINKS = {
            barra: "https://docs.google.com/spreadsheets/d/e/2PACX-1vS0Jh5z4AfQMk2IaNMtoBxR5Hw1e3eFkqA_W9HXuCv11EbNqvJbwtDyRqF5LyvbGoMO0XUWlGwG1dEM/pub?output=csv",
            cocina: "https://docs.google.com/spreadsheets/d/e/2PACX-1vScxVwjKMDRMzaENjT2Xoa6Wq7efpsflowDSLl-r7RiaGMGXKMtzG8mHkeoWKZfnca3mWk53JXb7hij/pub?output=csv"
        };

        window.sincronizar = async (area) => {
            const resp = await fetch(LINKS[area]);
            const data = await resp.text();
            const lineas = data.split('\n');
            lineas.shift();
            
            for(let linea of lineas) {
                const col = linea.split(',');
                if(col[0]) {
                    await setDoc(doc(db, "inventario_total", area + "_" + col[0].toLowerCase().replace(/\s/g, '_')), { 
                        area, name: col[0], cantidad: col[1] || 0 
                    });
                }
            }
            alert('¡' + area.toUpperCase() + ' sincronizado con éxito!');
        };

        onSnapshot(collection(db, "inventario_total"), (snap) => {
            const body = document.getElementById('invBody');
            body.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                body.innerHTML += `<tr><td>${d.area.toUpperCase()}</td><td>${d.name}</td><td>${d.cantidad}</td></tr>`;
            });
        });
    </script>
</body>
</html>
