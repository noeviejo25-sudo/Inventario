<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Inventario Pro - Barra & Cocina</title>
    <style>
        :root {
            --bg-primary: #f8fafc;
            --panel-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent: #2563eb;
            --border: #e2e8f0;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --color-barra: #0284c7;
            --color-cocina: #db2777;
            --current-unit-color: var(--color-barra);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg-primary); padding: 2rem 1rem; max-width: 1200px; margin: 0 auto; }
        .panel { background: var(--panel-bg); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1.5rem; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        input, select { width: 100%; padding: 0.5rem; border: 1px solid var(--border); border-radius: 0.375rem; }
        button { padding: 0.6rem 1rem; border-radius: 0.375rem; border: none; cursor: pointer; color: white; font-weight: bold; }
        .btn-primary { background: var(--accent); width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 0.75rem; border-bottom: 1px solid var(--border); text-align: left; }
        #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(15, 23, 42, 0.9); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: white; padding: 2rem; border-radius: 0.5rem; width: 300px; }
    </style>

    <!-- LIBRERÍAS FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDocs, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBo2atzdPgNnT6OUpPdzRZ1yFs44uhVAqE",
            authDomain: "inventarios-restaurantes.firebaseapp.com",
            projectId: "inventarios-restaurantes",
            storageBucket: "inventarios-restaurantes.firebasestorage.app",
            messagingSenderId: "1005713681720",
            appId: "1:1005713681720:web:76b2cf534c34aa0a17e5cd",
            measurementId: "G-VRM9THQQGZ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
        window.setDoc = setDoc;
        window.doc = doc;
        window.collection = collection;
        window.onSnapshot = onSnapshot;
        window.query = query;
        window.orderBy = orderBy;
    </script>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <h2>Acceso</h2>
            <select id="loginUser" style="margin: 1rem 0; width: 100%;">
                <option value="Administrador">Administrador</option>
            </select>
            <input type="password" id="loginPin" placeholder="PIN" style="margin-bottom: 1rem;">
            <button class="btn-primary" onclick="checkLogin()">Ingresar</button>
        </div>
    </div>

    <h1>Control de Inventario</h1>
    <div class="panel">
        <h3>Añadir Producto</h3>
        <input type="text" id="prodName" placeholder="Nombre" style="margin-bottom: 0.5rem;">
        <button class="btn-primary" onclick="saveProduct()">Guardar en Nube</button>
    </div>

    <div class="panel">
        <h3>Listado</h3>
        <table>
            <thead><tr><th>Producto</th><th>Acciones</th></tr></thead>
            <tbody id="inventoryBody"></tbody>
        </table>
    </div>

    <script>
        function checkLogin() {
            if(document.getElementById('loginPin').value === '1234') {
                document.getElementById('loginOverlay').style.display = 'none';
                loadData();
            } else { alert('PIN incorrecto'); }
        }

        async function saveProduct() {
            const name = document.getElementById('prodName').value;
            if(!name) return;
            const id = name.toLowerCase().replace(/\s+/g, '_');
            await window.setDoc(window.doc(window.db, "barra", id), { name: name });
            alert('Guardado');
        }

        function loadData() {
            const q = window.query(window.collection(window.db, "barra"));
            window.onSnapshot(q, (snapshot) => {
                const tbody = document.getElementById('inventoryBody');
                tbody.innerHTML = '';
                snapshot.forEach(doc => {
                    tbody.innerHTML += `<tr><td>${doc.data().name}</td><td>-</td></tr>`;
                });
            });
        }
    </script>
</body>
</html>
