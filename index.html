<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Barra y Cocina Pro</title>
    <style>
        :root {
            --bg-primary: #f8fafc; --panel-bg: #ffffff; --text-main: #1e293b; --text-muted: #64748b;
            --accent: #2563eb; --border: #e2e8f0; --success: #10b981; --warning: #f59e0b;
            --danger: #ef4444; --color-barra: #0284c7; --color-cocina: #db2777; --current-unit-color: var(--color-barra);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-primary); padding: 2rem; }
        .grid { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        .panel { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; }
        button { width: 100%; padding: 10px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-primary { background: var(--current-unit-color); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; }
        .stock-critico { background: #fef2f2; color: #b91c1c; }
    </style>
</head>
<body>

    <div class="grid">
        <div class="panel">
            <h3 id="formUnitHeader">UNIDAD ACTUAL: BARRA</h3>
            <form id="prodForm">
                <input type="text" id="pName" placeholder="Nombre Producto" required>
                <input type="number" id="pInit" placeholder="Inicial" required>
                <input type="number" id="pIn" placeholder="Entradas" required>
                <input type="number" id="pFin" placeholder="Final" required>
                <input type="number" id="pMin" placeholder="Mínimo" required>
                <button type="submit" class="btn-primary">Guardar en la Nube</button>
            </form>
            
            <hr style="margin: 20px 0;">
            
            <button onclick="downloadTemplateCSV()" style="background:#10b981; color:white;">⏬ Descargar Formato de Cierre</button>
            <input type="file" id="csvFile" style="margin-top:10px;">
            <button onclick="importCSV()" style="background:#475569; color:white;">⬆️ Cargar CSV</button>
            <button onclick="shiftInventory()" class="btn-warning">🔄 Cerrar Ciclo del Área</button>
        </div>

        <div class="panel">
            <h3>Listado en Tiempo Real</h3>
            <table>
                <thead><tr><th>Producto</th><th>Inicial</th><th>Entradas</th><th>Final</th><th>Mínimo</th><th>Consumido</th><th>Acciones</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        // Lógica de Firebase y Sincronización integradas
        // (La lógica que ya definimos para Firebase Firestore y manejo de CSV)
    </script>
</body>
</html>
